<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Rumah Makan Padang</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="logo">RM<span>PADANG</span></a>
            <div class="menu-toggle" onclick="toggleMobileMenu()"><i class="fa-solid fa-bars"></i></div>
            <div class="nav-menu">
                <a href="index.html">Beranda</a>
                <a href="menu.html">Menu</a>
                <a href="cart.html" class="cart-icon">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-count">0</span>
                </a>
                <a href="login.html" class="btn-login">Masuk</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div style="padding: 4rem 0; max-width: 450px; margin: 0 auto;">
            <div class="card" style="padding: 2rem;">
                <!-- Login Form -->
                <div id="login-form">
                    <h2 style="text-align: center; margin-bottom: 1.5rem;">Masuk</h2>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" placeholder="Masukkan email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="Masukkan password">
                    </div>
                    <button class="btn-primary" style="width: 100%;" onclick="handleLogin()">Masuk</button>
                    <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #666;">
                        Demo: admin@rmpadang.com / admin123
                    </p>
                    <p style="text-align: center; margin-top: 1rem;">
                        Belum punya akun? 
                        <a href="#" onclick="toggleForms()" style="color: var(--secondary);">Daftar</a>
                    </p>
                </div>
                
                <!-- Register Form -->
                <div id="register-form" style="display: none;">
                    <h2 style="text-align: center; margin-bottom: 1.5rem;">Daftar</h2>
                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" id="register-name" placeholder="Masukkan nama lengkap">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="register-email" placeholder="Masukkan email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="register-password" placeholder="Buat password">
                    </div>
                    <div class="form-group">
                        <label>Konfirmasi Password</label>
                        <input type="password" id="register-password-confirm" placeholder="Konfirmasi password">
                    </div>
                    <button class="btn-primary" style="width: 100%;" onclick="handleRegister()">Daftar</button>
                    <p style="text-align: center; margin-top: 1rem;">
                        Sudah punya akun? 
                        <a href="#" onclick="toggleForms()" style="color: var(--secondary);">Masuk</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        function toggleForms() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
        }

        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                showToast('Email dan password harus diisi', 'error');
                return;
            }
            
            const result = login(email, password);
            if (result.success) {
                showToast(result.message);
                setTimeout(() => {
                    // Check user role and redirect accordingly
                    const user = getCurrentUser();
                    if (user && user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1000);
            } else {
                showToast(result.message, 'error');
            }
        }

        function handleRegister() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-password-confirm').value;
            
            if (!name || !email || !password || !confirmPassword) {
                showToast('Semua field harus diisi', 'error');
                return;
            }
            
            const result = register(name, email, password, confirmPassword);
            if (result.success) {
                showToast(result.message);
                setTimeout(() => {
                    toggleForms();
                    document.getElementById('login-email').value = email;
                    document.getElementById('login-password').value = password;
                }, 1000);
            } else {
                showToast(result.message, 'error');
            }
        }
    </script>
</body>
</html>
