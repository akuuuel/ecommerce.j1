<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Produk - Rumah Makan Padang</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <script src="main.js"></script>
    <script>
        window.addEventListener('load', function() {
            protectAdminPage();
            renderAdminProducts();
        });
    </script>
    <div class="admin-container">
        <div class="admin-sidebar">
            <h2 style="margin-bottom: 2rem; text-align: center; font-family: 'Fraunces', serif; color: var(--primary);">RM PADANG</h2>
            <nav class="sidebar-nav">
                <a href="admin.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="product.html" class="active"><i class="fa-solid fa-utensils"></i> Kelola Produk</a>
                <a href="orders.html"><i class="fa-solid fa-box"></i> Pesanan</a>
                <a href="customers.html"><i class="fa-solid fa-users"></i> Pelanggan</a>
                <a href="inventory-report.html"><i class="fa-solid fa-file-invoice-dollar"></i> Laporan Stok</a>
                <a href="settings.html"><i class="fa-solid fa-gear"></i> Pengaturan</a>
                <a href="#" onclick="logout(); return false;" style="margin-top: 2rem;"><i class="fa-solid fa-right-from-bracket"></i> Keluar</a>
            </nav>
        </div>
        
        <div class="admin-main">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Kelola Produk</h1>
                <button class="btn-primary" onclick="addProductUI()">+ Tambah Produk</button>
            </div>
            
            <!-- Products Grid Container -->
            <div id="products-table-body" class="admin-card-grid">
                <!-- Products will be loaded as cards here -->
            </div>
            
            <!-- Add/Edit Product Form -->
            <div class="card" style="padding: 1.5rem; margin-top: 2rem;">
                <h3 style="margin-bottom: 1rem;" id="form-title">Tambah Produk Baru</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Nama Produk</label>
                        <input type="text" id="product-name" placeholder="Masukkan nama produk">
                    </div>
                    <div class="form-group">
                        <label>Harga</label>
                        <input type="number" id="product-price" placeholder="Masukkan harga" min="0">
                    </div>
                    <div class="form-group">
                        <label>Kategori</label>
                        <select id="product-category">
                            <option value="Resep Warisan">Resep Warisan</option>
                            <option value="Segar Alami">Segar Alami</option>
                            <option value="Camilan Klasik">Camilan Klasik</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Stok</label>
                        <input type="number" id="product-stock" placeholder="Masukkan stok" min="0">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>URL Gambar (Unsplash/Link Gambar)</label>
                        <input type="text" id="product-image-url" placeholder="https://images.unsplash.com/photo-..." oninput="previewImageURL()">
                        <div id="url-preview-container" style="margin-top: 1rem; display: none;">
                            <p style="font-size: 0.8rem; color: #666; margin-bottom: 0.5rem;">Preview Gambar:</p>
                            <img id="url-preview" src="" style="max-height: 150px; border-radius: 8px; object-fit: cover;">
                        </div>
                    </div>
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn-primary" onclick="saveProduct()">Simpan Produk</button>
                    <button class="btn-secondary" onclick="document.getElementById('form-title').textContent='Tambah Produk Baru'; editingProductId=null; document.getElementById('product-name').value=''; document.getElementById('product-price').value=''; document.getElementById('product-stock').value='';" style="background: #999;">Bersihkan Form</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
